<!DOCTYPE html>
<html>
<head>
    <title>N Reinas PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                url('/static/bg.jpg') no-repeat center center fixed;
    background-size: cover;

    color: white;
}

.box {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin: 20px auto;
    width: 75%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

input, select {
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #00adb5, #00fff5);
    color: black;
    font-weight: bold;
    cursor: pointer;
}

table {
    margin: auto;
    border-collapse: collapse;
}

td {
    width: 45px;
    height: 45px;
    text-align: center;
    font-size: 30px;
}

.blanco { background: #f0d9b5; }
.negro { background: #b58863; }

.reina { font-size: 32px; }

.conflicto {
    background: red !important;
}
</style>
</head>

<body>

<div class="box">
    <h1>N Reinas - Algoritmo Genético</h1>

    <form id="formulario">
        N: <input type="number" id="n" value="8"><br>
        Población: <input type="number" id="poblacion" value="50"><br>
        Generaciones: <input type="number" id="generaciones" value="100"><br>
        Mutación: <input type="number" step="0.01" id="mutacion" value="0.1"><br>

        Método:
        <select id="metodo">
            <option value="torneo">Torneo</option>
            <option value="ruleta">Ruleta</option>
        </select><br><br>

        <button type="submit">Ejecutar</button>
        <button type="button" onclick="comparar()">Comparar</button>
        <button type="button" onclick="descargar()">Descargar resultados</button>
    </form>
</div>

<div class="box">
    <h2>Resultado</h2>
    <p id="resultado"></p>
    <p id="tiempo"></p>
    <div id="tablero"></div>
</div>

<div class="box">
    <h2>Gráfica</h2>
    <canvas id="grafica"></canvas>
</div>

<script src="/static/script.js"></script>

</body>
</html>
